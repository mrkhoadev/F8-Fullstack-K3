<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 2</title>
    <style>
        * {
            font-family:cursive;
        }
        .text {
            font-size: 100pt;
        }
        .line_right {
            border-right: 5px solid #049806;
        }
        .line_bottom {
            border-bottom: 5px solid #049806;
        }
        table {
            margin: 0 auto;
        }
        td {
            font-size: 100pt;
            text-align: right;
        }
        th {
            width: 100px;
            height: 100px;
            font-size: 50pt;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td colspan="4" class="line_bottom"><span>9+9</span></td>
        </tr>
        <tr>
            <th class="line_right line_bottom">1</th>
            <th class="line_right line_bottom">2</th>
            <th class="line_right line_bottom">3</th>
            <th class="line_bottom">+</th>
        </tr>
        <tr>
            <th class="line_right line_bottom">4</th>
            <th class="line_right line_bottom">5</th>
            <th class="line_right line_bottom">6</th>
            <th class="line_bottom">-</th>
        </tr>
        <tr>
            <th class="line_right line_bottom">7</th>
            <th class="line_right line_bottom">8</th>
            <th class="line_right line_bottom">9</th>
            <th class="line_bottom">x</th>
        </tr>
        <tr>
            <th class="line_right line_bottom">C</th>
            <th class="line_right line_bottom">0</th>
            <th class="line_right line_bottom">=</th>
            <th class="line_bottom">/</th>
        </tr>
    </table>
</body>
</html>
